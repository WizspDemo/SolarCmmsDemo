<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Solar Portfolio Manager</title>
    
    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                primary: '#004E8C', // Deep Teal
                accent: '#ffaa44',  // Solar Orange
                neutral: '#f3f2f1', // Fluent UI Light Gray
                dark: '#201f1e',    // Fluent UI Dark Text
                border: '#edebe9',
              }
            },
            fontFamily: {
              sans: ['"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
            },
            boxShadow: {
              'fluent-card': '0 1.6px 3.6px 0 rgba(0,0,0,0.132), 0 0.3px 0.9px 0 rgba(0,0,0,0.108)',
              'fluent-hover': '0 3.2px 7.2px 0 rgba(0,0,0,0.132), 0 0.6px 1.8px 0 rgba(0,0,0,0.108)',
            }
          },
        },
      }
    </script>

    <!-- 2. React & ReactDOM (Development UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- 3. Babel Standalone (for JSX compilation) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 4. Fluent UI React (UMD) -->
    <script crossorigin src="https://unpkg.com/@fluentui/react@8/dist/fluentui.js"></script>

    <style>
      body {
        background-color: #faf9f8; /* Fluent UI default background */
        color: #201f1e;
        -webkit-font-smoothing: antialiased;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
      // --- Global Imports ---
      const { useState, useMemo, useEffect } = React;
      
      // --- ICON SYSTEM (Inline SVGs to replace external dependency) ---
      const createIcon = (paths) => ({ color = "currentColor", size = 24, className = "", ...props }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke={color}
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
          {...props}
        >
          {paths}
        </svg>
      );

      const Activity = createIcon(<><path d="M22 12h-4l-3 9L9 3l-3 9H2" /></>);
      const AlertTriangle = createIcon(<><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><path d="M12 9v4" /><path d="M12 17h.01" /></>);
      const CheckCircle2 = createIcon(<><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></>);
      const Zap = createIcon(<><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></>);
      const LayoutDashboard = createIcon(<><rect width="7" height="9" x="3" y="3" rx="1" /><rect width="7" height="5" x="14" y="3" rx="1" /><rect width="7" height="9" x="14" y="12" rx="1" /><rect width="7" height="5" x="3" y="16" rx="1" /></>);
      const ArrowUpRight = createIcon(<><path d="M7 7h10v10" /><path d="M7 17 17 7" /></>);
      const ArrowDownRight = createIcon(<><path d="m7 7 10 10" /><path d="M17 7v10H7" /></>);
      const Minus = createIcon(<><path d="M5 12h14" /></>);
      const ExternalLink = createIcon(<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></>);
      const ChevronRight = createIcon(<><path d="m9 18 6-6-6-6" /></>);

      // --- Constants & Mock Data (from constants.ts) ---
      const MOCK_PORTFOLIO = [
        {
          id: '1',
          name: 'Bhadla Solar Park',
          location: { country: 'India', flag: '🇮🇳' },
          capacityMW: 2245,
          preventiveCount: 12,
          correctiveCount: 3,
          criticalDefects: 0
        },
        {
          id: '2',
          name: 'Huanghe Hydropower Hainan Solar Park',
          location: { country: 'China', flag: '🇨🇳' },
          capacityMW: 2200,
          preventiveCount: 45,
          correctiveCount: 8,
          criticalDefects: 2
        },
        {
          id: '3',
          name: 'Pavagada Solar Park',
          location: { country: 'India', flag: '🇮🇳' },
          capacityMW: 2050,
          preventiveCount: 8,
          correctiveCount: 1,
          criticalDefects: 0
        },
        {
          id: '4',
          name: 'Benban Solar Park',
          location: { country: 'Egypt', flag: '🇪🇬' },
          capacityMW: 1650,
          preventiveCount: 22,
          correctiveCount: 5,
          criticalDefects: 1
        },
        {
          id: '5',
          name: 'Tengger Desert Solar Park',
          location: { country: 'China', flag: '🇨🇳' },
          capacityMW: 1547,
          preventiveCount: 30,
          correctiveCount: 12,
          criticalDefects: 4
        },
        {
          id: '6',
          name: 'Noor Abu Dhabi',
          location: { country: 'UAE', flag: '🇦🇪' },
          capacityMW: 1177,
          preventiveCount: 5,
          correctiveCount: 0,
          criticalDefects: 0
        },
        {
          id: '7',
          name: 'Mohammed bin Rashid Al Maktoum Solar Park',
          location: { country: 'UAE', flag: '🇦🇪' },
          capacityMW: 1013,
          preventiveCount: 14,
          correctiveCount: 2,
          criticalDefects: 0
        },
        {
          id: '8',
          name: 'Kurnool Ultra Mega Solar Park',
          location: { country: 'India', flag: '🇮🇳' },
          capacityMW: 1000,
          preventiveCount: 18,
          correctiveCount: 6,
          criticalDefects: 1
        },
        {
          id: '9',
          name: 'Datong Solar Power Top Runner Base',
          location: { country: 'China', flag: '🇨🇳' },
          capacityMW: 1000,
          preventiveCount: 25,
          correctiveCount: 9,
          criticalDefects: 3
        },
        {
          id: '10',
          name: 'NP Kunta',
          location: { country: 'India', flag: '🇮🇳' },
          capacityMW: 978,
          preventiveCount: 10,
          correctiveCount: 4,
          criticalDefects: 0
        },
        {
          id: '11',
          name: 'Longyangxia Dam Solar Park',
          location: { country: 'China', flag: '🇨🇳' },
          capacityMW: 850,
          preventiveCount: 16,
          correctiveCount: 7,
          criticalDefects: 2
        },
        {
          id: '12',
          name: 'Villanueva Solar Park',
          location: { country: 'Mexico', flag: '🇲🇽' },
          capacityMW: 828,
          preventiveCount: 9,
          correctiveCount: 2,
          criticalDefects: 0
        },
        {
          id: '13',
          name: 'Kamuthi Solar Power Project',
          location: { country: 'India', flag: '🇮🇳' },
          capacityMW: 648,
          preventiveCount: 7,
          correctiveCount: 1,
          criticalDefects: 0
        },
        {
          id: '14',
          name: 'Solar Star',
          location: { country: 'USA', flag: '🇺🇸' },
          capacityMW: 579,
          preventiveCount: 3,
          correctiveCount: 0,
          criticalDefects: 0
        },
        {
          id: '15',
          name: 'Desert Sunlight Solar Farm',
          location: { country: 'USA', flag: '🇺🇸' },
          capacityMW: 550,
          preventiveCount: 6,
          correctiveCount: 2,
          criticalDefects: 0
        }
      ];

      // --- Components ---

      // 1. KpiCard Component
      const KpiCard = ({ title, value, unit, icon, color, trend }) => {
        return (
          <div className="bg-white p-6 rounded-md shadow-fluent-card hover:shadow-fluent-hover transition-shadow duration-200 border-l-4 border-brand-primary flex flex-col justify-between h-32 relative overflow-hidden group">
            
            {/* Background Decorator */}
            <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity transform group-hover:scale-110 duration-500">
              {icon && React.cloneElement(icon, { size: 64 })}
            </div>

            <div className="flex justify-between items-start z-10">
              <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wide">{title}</h3>
              {icon && <div className="text-brand-primary opacity-80">{icon}</div>}
            </div>
            
            <div className="z-10 mt-2">
              <div className="flex items-baseline gap-2">
                  <span className="text-3xl font-bold text-gray-900" style={{ color: color }}>{value}</span>
                  {unit && <span className="text-sm font-medium text-gray-500">{unit}</span>}
              </div>
              
              {trend && (
                 <div className="mt-1 flex items-center text-xs">
                    {trend === 'up' && <span className="text-green-600 font-medium flex items-center"><ArrowUpRight size={14} /></span>}
                    {trend === 'down' && <span className="text-red-600 font-medium flex items-center"><ArrowDownRight size={14} /></span>}
                    {trend === 'neutral' && <span className="text-gray-400 font-medium flex items-center"><Minus size={14} /></span>}
                 </div>
              )}
            </div>
          </div>
        );
      };

      // 2. StatusBadge Component
      const StatusBadge = ({ criticalDefects }) => {
        let bgColor = 'bg-green-100';
        let textColor = 'text-green-800';
        let label = 'Healthy';
        let dotColor = 'bg-green-500';

        if (criticalDefects >= 3) {
          bgColor = 'bg-red-100';
          textColor = 'text-red-800';
          label = 'Critical';
          dotColor = 'bg-red-500';
        } else if (criticalDefects > 0) {
          bgColor = 'bg-yellow-100';
          textColor = 'text-yellow-800';
          label = 'Warning';
          dotColor = 'bg-yellow-500';
        }

        return (
          <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${bgColor} ${textColor}`}>
            <span className={`w-1.5 h-1.5 mr-1.5 rounded-full ${dotColor}`}></span>
            {label}
          </span>
        );
      };

      // 3. PortfolioGrid Component
      const PortfolioGrid = ({ data }) => {
        const handleOpenDashboard = (name) => {
          console.log(`Navigating to dashboard for: ${name}`);
          alert(`Opening detailed dashboard for ${name}...`);
        };

        return (
          <div className="bg-white rounded-md shadow-fluent-card border border-brand-border">
            <div className="p-4 border-b border-brand-border bg-gray-50 flex justify-between items-center">
              <h2 className="text-lg font-semibold text-brand-dark">Portfolio Assets</h2>
              <span className="text-xs text-gray-500 font-medium bg-white px-2 py-1 rounded border border-gray-200">
                  Total Assets: {data.length}
              </span>
            </div>
            
            {/* Mobile View: Cards */}
            <div className="md:hidden divide-y divide-brand-border">
              {data.map((park) => (
                <div key={park.id} className="p-4 hover:bg-gray-50 transition-colors">
                  <div className="flex justify-between items-start mb-3">
                    <div>
                       <div 
                          className="font-bold text-brand-primary text-lg cursor-pointer" 
                          onClick={() => handleOpenDashboard(park.name)}
                       >
                          {park.name}
                       </div>
                       <div className="text-sm text-gray-600 flex items-center mt-1">
                          <span className="mr-2 text-base">{park.location.flag}</span>
                          {park.location.country}
                       </div>
                    </div>
                    <StatusBadge criticalDefects={park.criticalDefects} />
                  </div>

                  <div className="grid grid-cols-2 gap-4 mb-4 text-sm">
                      <div className="bg-gray-50 p-2 rounded border border-gray-100">
                          <div className="text-gray-500 text-xs uppercase tracking-wide">Capacity</div>
                          <div className="font-mono font-medium">{park.capacityMW} MW</div>
                      </div>
                      <div className="bg-gray-50 p-2 rounded border border-gray-100">
                           <div className="text-gray-500 text-xs uppercase tracking-wide">Corrective</div>
                           {park.correctiveCount > 0 ? (
                              <div className="text-orange-700 font-semibold">{park.correctiveCount} Active</div>
                           ) : (
                              <div className="text-gray-400">-</div>
                           )}
                      </div>
                  </div>

                  <div className="flex items-center justify-between">
                       <span className="inline-block px-2 py-1 text-xs font-semibold text-blue-700 bg-blue-50 rounded border border-blue-100">
                           {park.preventiveCount} Preventive Tasks
                       </span>
                       <button 
                          onClick={() => handleOpenDashboard(park.name)}
                          className="flex items-center text-sm font-medium text-brand-primary hover:text-brand-dark"
                       >
                          Dashboard <ChevronRight size={16} />
                       </button>
                  </div>
                </div>
              ))}
            </div>

            {/* Desktop/Tablet View: Table */}
            <div className="hidden md:block overflow-x-auto">
              <table className="w-full text-left border-collapse">
                <thead>
                  <tr className="bg-white border-b border-brand-border text-sm text-gray-500">
                    <th className="py-3 px-4 font-semibold w-1/4">Park Name</th>
                    <th className="py-3 px-4 font-semibold">Location</th>
                    <th className="py-3 px-4 font-semibold text-right">Capacity</th>
                    <th className="py-3 px-4 font-semibold text-center">Prev. Tasks</th>
                    <th className="py-3 px-4 font-semibold text-center">Crit. Tasks</th>
                    <th className="py-3 px-4 font-semibold">Health Score</th>
                    <th className="py-3 px-4 font-semibold text-right">Action</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-brand-border">
                  {data.map((park) => (
                    <tr 
                      key={park.id} 
                      className="hover:bg-gray-50 transition-colors duration-150 group cursor-default"
                    >
                      <td className="py-3 px-4">
                          <div className="font-bold text-brand-primary group-hover:underline cursor-pointer" onClick={() => handleOpenDashboard(park.name)}>
                              {park.name}
                          </div>
                      </td>
                      <td className="py-3 px-4 text-sm text-gray-700">
                        <span className="mr-2 text-lg">{park.location.flag}</span>
                        {park.location.country}
                      </td>
                      <td className="py-3 px-4 text-sm text-gray-900 font-medium text-right font-mono">
                        {park.capacityMW} <span className="text-gray-500 text-xs">MW</span>
                      </td>
                      <td className="py-3 px-4 text-center">
                          <span className="inline-block px-2 py-1 text-xs font-semibold text-blue-700 bg-blue-50 rounded border border-blue-100">
                              {park.preventiveCount} Open
                          </span>
                      </td>
                      <td className="py-3 px-4 text-center">
                          {park.correctiveCount > 0 ? (
                              <span className="inline-block px-2 py-1 text-xs font-semibold text-orange-700 bg-orange-50 rounded border border-orange-100">
                                  {park.correctiveCount} Active
                              </span>
                          ) : (
                              <span className="text-xs text-gray-400">-</span>
                          )}
                      </td>
                      <td className="py-3 px-4">
                        <StatusBadge criticalDefects={park.criticalDefects} />
                      </td>
                      <td className="py-3 px-4 text-right">
                        <button 
                          onClick={() => handleOpenDashboard(park.name)}
                          className="inline-flex items-center gap-1 px-3 py-1.5 text-sm font-medium text-brand-primary hover:text-white hover:bg-brand-primary border border-brand-primary rounded transition-all duration-200"
                        >
                          <span>Dashboard</span>
                          <ExternalLink size={14} />
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      // 4. Main App Component
      const App = () => {
        // --- Calculate Aggregates ---
        const aggregates = useMemo(() => {
          return MOCK_PORTFOLIO.reduce(
            (acc, park) => ({
              totalPreventive: acc.totalPreventive + park.preventiveCount,
              totalCorrective: acc.totalCorrective + park.correctiveCount,
              totalCritical: acc.totalCritical + park.criticalDefects,
            }),
            { totalPreventive: 0, totalCorrective: 0, totalCritical: 0 }
          );
        }, []);

        return (
          <div className="min-h-screen bg-[#faf9f8] text-[#201f1e] font-sans pb-12">
            
            {/* --- Top Navigation Bar (Fluent-like) --- */}
            <header className="bg-brand-primary text-white shadow-md sticky top-0 z-50">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 md:h-12 flex items-center justify-between">
                  <div className="flex items-center gap-3 overflow-hidden">
                      <LayoutDashboard className="h-5 w-5 text-brand-accent flex-shrink-0" />
                      <span className="font-semibold text-lg tracking-tight truncate">Global Solar Portfolio Manager</span>
                  </div>
                  <div className="flex items-center gap-4 text-sm flex-shrink-0">
                      <span className="hidden sm:inline opacity-80 hover:opacity-100 cursor-pointer transition-opacity">Settings</span>
                      <span className="opacity-80 hover:opacity-100 cursor-pointer transition-opacity">
                          <span className="hidden sm:inline">User Profile</span>
                          <span className="sm:hidden">Profile</span>
                      </span>
                  </div>
              </div>
            </header>

            {/* --- Main Content Area --- */}
            <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8 space-y-6 md:space-y-8">
              
              {/* --- KPI Cards Section --- */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                  <KpiCard 
                      title="Preventive Workflow" 
                      value={aggregates.totalPreventive} 
                      unit="Open Tasks"
                      icon={<CheckCircle2 />}
                      color="#059669" // Greenish
                  />
                  <KpiCard 
                      title="Critical Defects" 
                      value={aggregates.totalCritical} 
                      unit="Alerts"
                      icon={<AlertTriangle />}
                      color="#DC2626" // Red
                  />
                  <KpiCard 
                      title="Corrective Workflow" 
                      value={aggregates.totalCorrective} 
                      unit="Active"
                      icon={<Activity />}
                      color="#ffaa44" // Solar Orange
                  />
              </div>

              {/* --- Portfolio Grid Section --- */}
              <section>
                   <PortfolioGrid data={MOCK_PORTFOLIO} />
              </section>

            </main>
          </div>
        );
      };

      // --- Mount Application ---
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
