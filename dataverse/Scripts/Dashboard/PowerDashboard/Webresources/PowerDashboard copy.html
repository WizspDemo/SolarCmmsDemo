<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Power Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/segoe-ui-4" rel="stylesheet">

    <!-- Dataverse Web Resources -->
    <script src="https://org08dc9606.crm4.dynamics.com/WebResources/solar_react"></script>
    <script src="https://org08dc9606.crm4.dynamics.com/WebResources/solar_reactdom"></script>
    <script src="https://org08dc9606.crm4.dynamics.com/WebResources/solar_fluentui"></script>
    <script src="https://org08dc9606.crm4.dynamics.com/WebResources/solar_babel"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                primary: '#004E8C',
                accent: '#ffaa44',
                neutral: '#f3f2f1',
                dark: '#201f1e',
                border: '#edebe9',
              }
            },
            fontFamily: { sans: ['"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'] },
            boxShadow: {
              'fluent-card': '0 1.6px 3.6px 0 rgba(0,0,0,0.132), 0 0.3px 0.9px 0 rgba(0,0,0,0.108)',
              'fluent-hover': '0 3.2px 7.2px 0 rgba(0,0,0,0.132), 0 0.6px 1.8px 0 rgba(0,0,0,0.108)',
            }
          },
        },
      }
    </script>

    <style>
      body {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background-color: #faf9f8;
        color: #201f1e;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
      }
      .dashboard-font-base {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-size: 14px;
        font-weight: 400;
        line-height: 20px;
        color: #323130;
      }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    </style>
</head>
<body>
  <h1>TEST LOCAL</h1>
    <div id="root" data-testid="power-dashboard-root"></div>

    <script type="text/babel">
      const { useState, useMemo, useEffect } = React;

      function getXrmWebApi() {
        try {
          if (window.parent && window.parent.Xrm && window.parent.Xrm.WebApi) return window.parent.Xrm.WebApi;
        } catch (e) { }
        return null;
      }

      function openSolarLocationForm(locationId) {
        try {
          const xrm = window.parent && window.parent.Xrm;
          if (xrm && xrm.Navigation && xrm.Navigation.openForm && locationId) {
            xrm.Navigation.openForm({
              entityName: 'solar_location',
              entityId: locationId
            });
          } else {
            window.open('/main.aspx?pagetype=entityrecord&etn=solar_location&id=' + locationId, '_blank');
          }
        } catch (e) {
          window.open('/main.aspx?pagetype=entityrecord&etn=solar_location&id=' + locationId, '_blank');
        }
      }

      // --- ICON SYSTEM (Inline SVGs) ---
      const createIcon = (paths) => ({ color = "currentColor", size = 24, className = "", ...props }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke={color}
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
          {...props}
        >
          {paths}
        </svg>
      );

      const Activity = createIcon(<><path d="M22 12h-4l-3 9L9 3l-3 9H2" /></>);
      const AlertTriangle = createIcon(<><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><path d="M12 9v4" /><path d="M12 17h.01" /></>);
      const CheckCircle2 = createIcon(<><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></>);
      const LayoutDashboard = createIcon(<><rect width="7" height="9" x="3" y="3" rx="1" /><rect width="7" height="5" x="14" y="3" rx="1" /><rect width="7" height="9" x="14" y="12" rx="1" /><rect width="7" height="5" x="3" y="16" rx="1" /></>);
      const ArrowUpRight = createIcon(<><path d="M7 7h10v10" /><path d="M7 17 17 7" /></>);
      const ArrowDownRight = createIcon(<><path d="m7 7 10 10" /><path d="M17 7v10H7" /></>);
      const Minus = createIcon(<><path d="M5 12h14" /></>);
      const ExternalLink = createIcon(<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></>);
      const Search = createIcon(<><circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" /></>);

      const ENTITY_LOCATION = 'solar_location';
      const ENTITY_CORRECTIVE = 'solar_corrective_work_order';
      const ENTITY_PREVENTIVE = 'solar_solarpreventivetask';
      const ENTITY_REMEDIAL = 'solar_remedial';
      // solar_prev_status value for "In Progress" on solar_solarpreventivetask (change if your option set differs)
      const PREVENTIVE_STATUS_IN_PROGRESS = 2;
      // statuscode value for "In Progress" on solar_corrective_work_order (change if your option set differs)
      const CORRECTIVE_STATUS_IN_PROGRESS = 2;
      // statuscode value for "In Progress" on solar_remedial (change if your option set differs)
      const REMEDIAL_STATUS_IN_PROGRESS = 2;

      // --- Components ---

      const KpiCard = ({ title, value, unit, icon, color, trend }) => {
        return (
          <div className="bg-white p-6 rounded-md shadow-fluent-card hover:shadow-fluent-hover transition-shadow duration-200 border-l-4 border-brand-primary flex flex-col justify-between h-32 relative overflow-hidden group">
            <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity transform group-hover:scale-110 duration-500">
              {icon && React.cloneElement(icon, { size: 64 })}
            </div>
            <div className="flex justify-between items-start z-10">
              <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wide">{title}</h3>
              {icon && <div className="text-brand-primary opacity-80">{icon}</div>}
            </div>
            <div className="z-10 mt-2">
              <div className="flex items-baseline gap-2">
                  <span className="text-3xl font-bold text-gray-900" style={{ color: color }}>{value}</span>
                  {unit && <span className="text-sm font-medium text-gray-500">{unit}</span>}
              </div>
              {trend && (
                 <div className="mt-1 flex items-center text-xs">
                    {trend === 'up' && <span className="text-green-600 font-medium flex items-center"><ArrowUpRight size={14} /></span>}
                    {trend === 'down' && <span className="text-red-600 font-medium flex items-center"><ArrowDownRight size={14} /></span>}
                    {trend === 'neutral' && <span className="text-gray-400 font-medium flex items-center"><Minus size={14} /></span>}
                 </div>
              )}
            </div>
          </div>
        );
      };

      const StatusBadge = ({ criticalDefects }) => {
        let bgColor = 'bg-green-100';
        let textColor = 'text-green-800';
        let label = 'Healthy';
        let dotColor = 'bg-green-500';

        if (criticalDefects >= 3) {
          bgColor = 'bg-red-100';
          textColor = 'text-red-800';
          label = 'Critical';
          dotColor = 'bg-red-500';
        } else if (criticalDefects > 0) {
          bgColor = 'bg-yellow-100';
          textColor = 'text-yellow-800';
          label = 'Warning';
          dotColor = 'bg-yellow-500';
        }

        return (
          <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${bgColor} ${textColor}`}>
            <span className={`w-1.5 h-1.5 mr-1.5 rounded-full ${dotColor}`}></span>
            {label}
          </span>
        );
      };

      const PortfolioGrid = ({ data, searchQuery, onSearchChange }) => {
        const handleOpenForm = (park) => {
          if (park && park.id) openSolarLocationForm(park.id);
        };
        const q = (searchQuery || '').trim();
        const filtered = !q ? data : data.filter(p => (p.name || '').toLowerCase().includes(q.toLowerCase()));
        return (
          <div className="bg-white rounded-md shadow-fluent-card border border-brand-border">
            <div className="p-4 border-b border-brand-border bg-gray-50">
              <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                <h2 className="text-lg font-semibold text-brand-dark">Solar Parks</h2>
                <div className="flex items-center gap-2">
                  <div className="relative flex-1 sm:w-64">
                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400" size={16} />
                    <input
                      type="text"
                      placeholder="Αναζήτηση Park Name..."
                      value={searchQuery || ''}
                      onChange={(e) => onSearchChange && onSearchChange(e.target.value)}
                      className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-md focus:ring-2 focus:ring-brand-primary/30 focus:border-brand-primary outline-none"
                    />
                  </div>
                  <span className="text-xs text-gray-500 font-medium bg-white px-2 py-1 rounded border border-gray-200 whitespace-nowrap">
                      {filtered.length} / {data.length} Parks
                  </span>
                </div>
              </div>
            </div>
            
            {filtered.length === 0 && data.length > 0 ? (
              <div className="p-8 text-center text-gray-500">
                <p>Δεν βρέθηκαν Solar Parks με αυτό το όνομα.</p>
                <p className="text-sm mt-1">Δοκιμάστε άλλο όρο αναζήτησης.</p>
              </div>
            ) : (
            <>
            <div className="md:hidden divide-y divide-brand-border">
              {filtered.map((park) => (
                <div key={park.id} className="p-4 hover:bg-gray-50 transition-colors">
                  <div className="flex justify-between items-start mb-3">
                    <div>
                       <div className="font-bold text-brand-primary text-lg">{park.name}</div>
                    </div>
                    <div className="flex items-center gap-2">
                      <StatusBadge criticalDefects={park.criticalDefects} />
                      <button
                        onClick={() => handleOpenForm(park)}
                        className="p-1.5 rounded hover:bg-brand-primary/10 text-brand-primary transition-colors"
                        title="Άνοιγμα φόρμας Solar Park"
                      >
                        <ExternalLink size={18} />
                      </button>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-4 mb-4 text-sm">
                      <div className="bg-gray-50 p-2 rounded border border-gray-100">
                          <div className="text-gray-500 text-xs uppercase tracking-wide">Capacity</div>
                          <div className="font-mono font-medium">{park.capacityMW} MW</div>
                      </div>
                      <div className="bg-gray-50 p-2 rounded border border-gray-100">
                           <div className="text-gray-500 text-xs uppercase tracking-wide">Corrective</div>
                           {park.correctiveCount > 0 ? (
                              <div className="text-orange-700 font-semibold">{park.correctiveCount} Active</div>
                           ) : (
                              <div className="text-gray-400">-</div>
                           )}
                      </div>
                  </div>
                  <div className="flex items-center justify-between">
                       <span className="inline-block px-2 py-1 text-xs font-semibold text-blue-700 bg-blue-50 rounded border border-blue-100">
                           {park.preventiveCount} Preventive Tasks
                       </span>
                  </div>
                </div>
              ))}
            </div>

            <div className="hidden md:block overflow-x-auto">
              <table className="w-full text-left border-collapse">
                <thead>
                  <tr className="bg-white border-b border-brand-border text-sm text-gray-500">
                    <th className="py-3 px-4 font-semibold w-1/4">Park Name</th>
                    <th className="py-3 px-4 font-semibold text-right">Capacity</th>
                    <th className="py-3 px-4 font-semibold text-center">Prev. Tasks</th>
                    <th className="py-3 px-4 font-semibold text-center">Corrective Tasks</th>
                    <th className="py-3 px-4 font-semibold">Health Score</th>
                    <th className="py-3 px-4 font-semibold text-right w-16"></th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-brand-border">
                  {filtered.map((park) => (
                    <tr 
                      key={park.id} 
                      className="hover:bg-gray-50 transition-colors duration-150 group cursor-default"
                    >
                      <td className="py-3 px-4">
                          <div className="font-bold text-brand-primary">{park.name}</div>
                      </td>
                      <td className="py-3 px-4 text-sm text-gray-900 font-medium text-right font-mono">
                        {park.capacityMW} <span className="text-gray-500 text-xs">MW</span>
                      </td>
                      <td className="py-3 px-4 text-center">
                          <span className="inline-block px-2 py-1 text-xs font-semibold text-blue-700 bg-blue-50 rounded border border-blue-100">
                              {park.preventiveCount} Open
                          </span>
                      </td>
                      <td className="py-3 px-4 text-center">
                          {park.correctiveCount > 0 ? (
                              <span className="inline-block px-2 py-1 text-xs font-semibold text-orange-700 bg-orange-50 rounded border border-orange-100">
                                  {park.correctiveCount} Active
                              </span>
                          ) : (
                              <span className="text-xs text-gray-400">-</span>
                          )}
                      </td>
                      <td className="py-3 px-4">
                        <StatusBadge criticalDefects={park.criticalDefects} />
                      </td>
                      <td className="py-3 px-4 text-right">
                        <button
                          onClick={() => handleOpenForm(park)}
                          className="p-2 rounded hover:bg-brand-primary/10 text-brand-primary transition-colors inline-flex items-center justify-center"
                          title="Άνοιγμα φόρμας Solar Park"
                        >
                          <ExternalLink size={18} />
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            </>
            )}
          </div>
        );
      };

      const App = () => {
        const [portfolio, setPortfolio] = useState([]);
        const [searchQuery, setSearchQuery] = useState('');
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);

        useEffect(function loadAllParks() {
          const webApi = getXrmWebApi();

          if (!webApi || !webApi.retrieveMultipleRecords) {
            setError('Δεν βρέθηκε πλαίσιο Dataverse (Xrm.WebApi). Ανοίξτε αυτή τη σελίδα μέσα σε Model-driven app.');
            setLoading(false);
            return;
          }

          setLoading(true);
          setError(null);

          const fetchAllParks = async () => {
            // Only ACTIVE solar_location (statecode=0), fetch ALL via paging
            const PAGE_SIZE = 5000;
            let all = [];
            let page = 1;
            let hasMore = true;
            while (hasMore) {
              const fetchXml = '<fetch count="' + PAGE_SIZE + '" page="' + page + '"><entity name="' + ENTITY_LOCATION + '"><attribute name="solar_locationid"/><attribute name="solar_name"/><attribute name="solar_capacity_mw"/><filter type="and"><condition attribute="statecode" operator="eq" value="0"/></filter><order attribute="solar_name"/><order attribute="solar_locationid"/></entity></fetch>';
              const query = '?fetchXml=' + encodeURIComponent(fetchXml);
              const r = await webApi.retrieveMultipleRecords(ENTITY_LOCATION, query);
              const entities = (r && r.entities) ? r.entities : [];
              all = all.concat(entities);
              hasMore = entities.length >= PAGE_SIZE;
              page++;
            }
            return all;
          };

          const fetchPreventiveCount = (locationId) => {
            const guid = (locationId || '').replace(/[{}]/g, '');
            const fetchXml = '<fetch aggregate="true"><entity name="' + ENTITY_PREVENTIVE + '"><attribute name="solar_solarpreventivetaskid" aggregate="count" alias="cnt"/><filter type="and"><condition attribute="solar_park" operator="eq" value="{' + guid + '}"/><condition attribute="statecode" operator="ne" value="1"/></filter></entity></fetch>';
            return webApi.retrieveMultipleRecords(ENTITY_PREVENTIVE, '?fetchXml=' + encodeURIComponent(fetchXml))
              .then(r => { const e = (r && r.entities && r.entities[0]) ? r.entities[0] : {}; return parseInt(e.cnt || '0', 10); })
              .catch(() => 0);
          };

          const fetchPreventiveCompletedCount = (locationId) => {
            const guid = (locationId || '').replace(/[{}]/g, '');
            const fetchXml = '<fetch aggregate="true"><entity name="' + ENTITY_PREVENTIVE + '"><attribute name="solar_solarpreventivetaskid" aggregate="count" alias="cnt"/><filter type="and"><condition attribute="solar_park" operator="eq" value="{' + guid + '}"/><condition attribute="statecode" operator="eq" value="1"/></filter></entity></fetch>';
            return webApi.retrieveMultipleRecords(ENTITY_PREVENTIVE, '?fetchXml=' + encodeURIComponent(fetchXml))
              .then(r => { const e = (r && r.entities && r.entities[0]) ? r.entities[0] : {}; return parseInt(e.cnt || '0', 10); })
              .catch(() => 0);
          };

          const fetchPreventiveInProgressCount = (locationId) => {
            const guid = (locationId || '').replace(/[{}]/g, '');
            const fetchXml = '<fetch aggregate="true"><entity name="' + ENTITY_PREVENTIVE + '"><attribute name="solar_solarpreventivetaskid" aggregate="count" alias="cnt"/><filter type="and"><condition attribute="solar_park" operator="eq" value="{' + guid + '}"/><condition attribute="statecode" operator="ne" value="1"/><condition attribute="solar_prev_status" operator="eq" value="' + PREVENTIVE_STATUS_IN_PROGRESS + '"/></filter></entity></fetch>';
            return webApi.retrieveMultipleRecords(ENTITY_PREVENTIVE, '?fetchXml=' + encodeURIComponent(fetchXml))
              .then(r => { const e = (r && r.entities && r.entities[0]) ? r.entities[0] : {}; return parseInt(e.cnt || '0', 10); })
              .catch(() => 0);
          };

          const fetchCorrectiveCounts = (locationId) => {
            const guid = (locationId || '').replace(/[{}]/g, '');
            const fetchXml = '<fetch><entity name="' + ENTITY_CORRECTIVE + '"><attribute name="solar_corrective_work_orderid"/><attribute name="solar_solar_priority"/><attribute name="statecode"/><attribute name="statuscode"/><filter type="and"><condition attribute="solar_locationid" operator="eq" value="{' + guid + '}"/></filter></entity></fetch>';
            return webApi.retrieveMultipleRecords(ENTITY_CORRECTIVE, '?fetchXml=' + encodeURIComponent(fetchXml))
              .then(r => {
                const entities = (r && r.entities) ? r.entities : [];
                const active = entities.filter(e => e.statecode !== 1).length;
                const completed = entities.filter(e => e.statecode === 1).length;
                const inProgress = entities.filter(e => e.statecode !== 1 && e.statuscode === CORRECTIVE_STATUS_IN_PROGRESS).length;
                const open = Math.max(0, active - inProgress);
                const critical = entities.filter(e => e.statecode !== 1 && e.solar_solar_priority === 1).length;
                return { corrective: active, correctiveOpen: open, correctiveInProgress: inProgress, correctiveCompleted: completed, critical };
              })
              .catch(() => ({ corrective: 0, correctiveOpen: 0, correctiveInProgress: 0, correctiveCompleted: 0, critical: 0 }));
          };

          const fetchRemedialCounts = (locationId) => {
            const guid = (locationId || '').replace(/[{}]/g, '');
            const fetchXml =
              '<fetch>' +
                '<entity name="' + ENTITY_REMEDIAL + '">' +
                  '<attribute name="solar_remedialid"/>' +
                  '<attribute name="statecode"/>' +
                  '<attribute name="statuscode"/>' +
                  '<filter type="and">' +
                    '<condition attribute="solar_rem_solarsite" operator="eq" value="{' + guid + '}"/>' +
                  '</filter>' +
                '</entity>' +
              '</fetch>';
            return webApi.retrieveMultipleRecords(ENTITY_REMEDIAL, '?fetchXml=' + encodeURIComponent(fetchXml))
              .then(r => {
                const entities = (r && r.entities) ? r.entities : [];
                const active = entities.filter(e => e.statecode !== 1).length;
                const completed = entities.filter(e => e.statecode === 1).length;
                const inProgress = entities.filter(e => e.statecode !== 1 && e.statuscode === REMEDIAL_STATUS_IN_PROGRESS).length;
                const open = Math.max(0, active - inProgress);
                return {
                  remedial: active,
                  remedialOpen: open,
                  remedialInProgress: inProgress,
                  remedialCompleted: completed
                };
              })
              .catch(() => ({
                remedial: 0,
                remedialOpen: 0,
                remedialInProgress: 0,
                remedialCompleted: 0
              }));
          };

          const processInBatches = async (items, batchSize, fn) => {
            const results = [];
            for (let i = 0; i < items.length; i += batchSize) {
              const batch = items.slice(i, i + batchSize);
              const batchResults = await Promise.all(batch.map(fn));
              results.push(...batchResults);
            }
            return results;
          };

          fetchAllParks()
            .then(async (locations) => {
              const parks = await processInBatches(locations, 5, async (loc) => {
                const id = (loc.solar_locationid || '').replace(/[{}]/g, '');
                const [prev, prevInProgress, prevCompleted, corr, rem] = await Promise.all([
                  fetchPreventiveCount(id),
                  fetchPreventiveInProgressCount(id),
                  fetchPreventiveCompletedCount(id),
                  fetchCorrectiveCounts(id),
                  fetchRemedialCounts(id)
                ]);
                return {
                  id: loc.solar_locationid,
                  name: loc.solar_name || '-',
                  capacityMW: loc.solar_capacity_mw != null ? Number(loc.solar_capacity_mw) : 0,
                  preventiveCount: prev,
                  preventiveInProgressCount: prevInProgress,
                  preventiveCompletedCount: prevCompleted,
                  correctiveCount: corr.corrective,
                  correctiveOpenCount: corr.correctiveOpen,
                  correctiveInProgressCount: corr.correctiveInProgress,
                  correctiveCompletedCount: corr.correctiveCompleted,
                  remedialCount: rem.remedial,
                  remedialOpenCount: rem.remedialOpen,
                  remedialInProgressCount: rem.remedialInProgress,
                  remedialCompletedCount: rem.remedialCompleted,
                  criticalDefects: corr.critical
                };
              });
              setPortfolio(parks);
              setError(null);
            })
            .catch(err => {
              console.error('PowerDashboard fetch error:', err);
              setError(err.message || 'Αποτυχία φόρτωσης δεδομένων.');
              setPortfolio([]);
            })
            .then(() => setLoading(false));
        }, []);

        const aggregates = useMemo(() => {
          return portfolio.reduce(
            (acc, park) => ({
              totalPreventive: acc.totalPreventive + (park.preventiveCount || 0),
              totalPreventiveInProgress: acc.totalPreventiveInProgress + (park.preventiveInProgressCount || 0),
              totalPreventivePrevious: acc.totalPreventivePrevious + (park.preventiveCompletedCount || 0),
              totalCorrective: acc.totalCorrective + (park.correctiveCount || 0),
              totalCorrectiveOpen: acc.totalCorrectiveOpen + (park.correctiveOpenCount || 0),
              totalCorrectiveInProgress: acc.totalCorrectiveInProgress + (park.correctiveInProgressCount || 0),
              totalCorrectivePrevious: acc.totalCorrectivePrevious + (park.correctiveCompletedCount || 0),
              totalRemedialOpen: acc.totalRemedialOpen + (park.remedialOpenCount || 0),
              totalRemedialInProgress: acc.totalRemedialInProgress + (park.remedialInProgressCount || 0),
              totalRemedialPrevious: acc.totalRemedialPrevious + (park.remedialCompletedCount || 0),
              totalCritical: acc.totalCritical + (park.criticalDefects || 0),
            }),
            {
              totalPreventive: 0,
              totalPreventiveInProgress: 0,
              totalPreventivePrevious: 0,
              totalCorrective: 0,
              totalCorrectiveOpen: 0,
              totalCorrectiveInProgress: 0,
              totalCorrectivePrevious: 0,
              totalRemedialOpen: 0,
              totalRemedialInProgress: 0,
              totalRemedialPrevious: 0,
              totalCritical: 0
            }
          );
        }, [portfolio]);

        if (loading) {
          return (
            <div className="min-h-screen bg-[#faf9f8] flex items-center justify-center">
              <div className="text-center">
                <div className="inline-block w-12 h-12 border-4 border-brand-primary border-t-transparent rounded-full animate-spin mb-4"></div>
                <p className="text-gray-600 font-medium">Φόρτωση δεδομένων…</p>
              </div>
            </div>
          );
        }

        if (error) {
          return (
            <div className="min-h-screen bg-[#faf9f8] flex items-center justify-center p-6">
              <div className="bg-red-50 border border-red-200 rounded-lg p-6 max-w-md text-center">
                <p className="text-red-600 font-semibold mb-2">Σφάλμα</p>
                <p className="text-gray-700 text-sm">{error}</p>
              </div>
            </div>
          );
        }

        if (portfolio.length === 0) {
          return (
            <div className="min-h-screen bg-[#faf9f8] flex items-center justify-center p-6">
              <div className="bg-white border border-gray-200 rounded-lg p-8 max-w-md text-center shadow-sm">
                <p className="text-gray-600 font-medium mb-2">Δεν βρέθηκαν ενεργά Solar Parks</p>
                <p className="text-gray-500 text-sm">Δεν υπάρχουν ενεργές εγγραφές Solar Park στο σύστημα.</p>
              </div>
            </div>
          );
        }

        return (
          <div className="min-h-screen bg-[#faf9f8] text-[#201f1e] font-sans pb-12">
            
            <header className="bg-brand-primary text-white shadow-md sticky top-0 z-50">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 md:h-12 flex items-center justify-between">
                  <div className="flex items-center gap-3 overflow-hidden">
                      <LayoutDashboard className="h-5 w-5 text-brand-accent flex-shrink-0" />
                      <span className="font-semibold text-lg tracking-tight truncate">Solar Power Dashboard local</span>
                  </div>
              </div>
            </header>

            <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8 space-y-6 md:space-y-8">
              
              <div className="flex flex-wrap gap-4 md:gap-6 justify-start">
                  <div className="bg-white p-6 rounded-md shadow-fluent-card hover:shadow-fluent-hover transition-shadow duration-200 border-l-4 border-brand-primary flex flex-col justify-between min-h-[10rem] relative overflow-hidden group w-full md:w-1/2 lg:w-1/3">
                    <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity transform group-hover:scale-110 duration-500">
                      <Activity size={64} />
                    </div>
                    <div className="flex justify-between items-start z-10">
                      <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wide">Corrective Workflow</h3>
                      <div className="text-brand-primary opacity-80"><Activity /></div>
                    </div>
                    <div className="z-10 mt-3 space-y-1.5 text-sm">
                      <div className="flex justify-between items-center">
                        <span className="text-gray-600">Open Tasks</span>
                        <span className="font-bold text-gray-900" style={{ color: '#ffaa44' }}>{aggregates.totalCorrectiveOpen || 0}</span>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="text-gray-600">In Progress Tasks</span>
                        <span className="font-bold text-gray-900" style={{ color: '#ffaa44' }}>{aggregates.totalCorrectiveInProgress || 0}</span>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="text-gray-600">Previous Tasks</span>
                        <span className="font-bold text-gray-900" style={{ color: '#ffaa44' }}>{aggregates.totalCorrectivePrevious || 0}</span>
                      </div>
                    </div>
                  </div>
                  <div className="bg-white p-6 rounded-md shadow-fluent-card hover:shadow-fluent-hover transition-shadow duration-200 border-l-4 border-brand-primary flex flex-col justify-between min-h-[10rem] relative overflow-hidden group w-full md:w-1/2 lg:w-1/3">
                    <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity transform group-hover:scale-110 duration-500">
                      <CheckCircle2 size={64} />
                    </div>
                    <div className="flex justify-between items-start z-10">
                      <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wide">Preventative Workflow</h3>
                      <div className="text-brand-primary opacity-80"><CheckCircle2 /></div>
                    </div>
                    <div className="z-10 mt-3 space-y-1.5 text-sm">
                      <div className="flex justify-between items-center">
                        <span className="text-gray-600">Open Tasks</span>
                        <span className="font-bold text-gray-900" style={{ color: '#059669' }}>{Math.max(0, (aggregates.totalPreventive || 0) - (aggregates.totalPreventiveInProgress || 0))}</span>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="text-gray-600">In Progress Tasks</span>
                        <span className="font-bold text-gray-900" style={{ color: '#059669' }}>{aggregates.totalPreventiveInProgress || 0}</span>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="text-gray-600">Previous Tasks</span>
                        <span className="font-bold text-gray-900" style={{ color: '#059669' }}>{aggregates.totalPreventivePrevious ?? 0}</span>
                      </div>
                    </div>
                  </div>
                  <div className="bg-white p-6 rounded-md shadow-fluent-card hover:shadow-fluent-hover transition-shadow duration-200 border-l-4 border-brand-primary flex flex-col justify-between min-h-[10rem] relative overflow-hidden group w-full md:w-1/2 lg:w-1/3">
                    <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity transform group-hover:scale-110 duration-500">
                      <AlertTriangle size={64} />
                    </div>
                    <div className="flex justify-between items-start z-10">
                      <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wide">Remedial</h3>
                      <div className="text-brand-primary opacity-80"><AlertTriangle /></div>
                    </div>
                    <div className="z-10 mt-3 space-y-1.5 text-sm">
                      <div className="flex justify-between items-center">
                        <span className="text-gray-600">Open Tasks</span>
                        <span className="font-bold text-gray-900" style={{ color: '#DC2626' }}>{aggregates.totalRemedialOpen || 0}</span>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="text-gray-600">In Progress Tasks</span>
                        <span className="font-bold text-gray-900" style={{ color: '#DC2626' }}>{aggregates.totalRemedialInProgress || 0}</span>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="text-gray-600">Previous Tasks</span>
                        <span className="font-bold text-gray-900" style={{ color: '#DC2626' }}>{aggregates.totalRemedialPrevious || 0}</span>
                      </div>
                    </div>
                  </div>
              </div>

              <section>
                   <PortfolioGrid data={portfolio} searchQuery={searchQuery} onSearchChange={setSearchQuery} />
              </section>

            </main>
          </div>
        );
      };

      ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
