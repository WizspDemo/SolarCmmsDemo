<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Maintenance Team Members</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 12px;
        background: #f5f5f5;
        color: #333;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 8px 0;
      }

      .subtitle {
        font-size: 12px;
        color: #666;
        margin-bottom: 12px;
      }

      .status {
        font-size: 12px;
        margin-bottom: 8px;
      }

      .status.loading {
        color: #005a9e;
      }

      .status.error {
        color: #a80000;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
      }

      thead {
        background: #f3f2f1;
      }

      th,
      td {
        padding: 6px 8px;
        font-size: 12px;
        text-align: left;
        border-bottom: 1px solid #e1dfdd;
      }

      th {
        font-weight: 600;
      }

      tbody tr:nth-child(even) {
        background: #faf9f8;
      }

      .jobs-badge {
        display: inline-block;
        min-width: 24px;
        padding: 2px 6px;
        border-radius: 10px;
        text-align: center;
        background: #eaeaea;
      }

      .jobs-badge.zero {
        background: #f3f2f1;
        color: #605e5c;
      }

      .jobs-badge.nonzero {
        background: #dff6dd;
        color: #107c10;
      }

      .btn-assign {
        margin-left: 6px;
        padding: 4px 10px;
        font-size: 11px;
        border: 1px solid #0078d4;
        background: #0078d4;
        color: #fff;
        border-radius: 4px;
        cursor: pointer;
        white-space: nowrap;
      }

      .btn-assign:hover {
        background: #106ebe;
      }
    </style>
  </head>
  <body>
    <h1 id="title">Maintenance Team Members</h1>
    <div id="subtitle" class="subtitle"></div>
    <div id="status" class="status loading">Loading...</div>

    <table aria-label="Maintenance Team Members">
      <thead>
        <tr>
          <th>Employee</th>
          <th style="width: 80px; text-align: center">Preventative</th>
          <th style="width: 80px; text-align: center">Corrective</th>
          <th style="width: 70px"></th>
        </tr>
      </thead>
      <tbody id="rowsContainer">
        <!-- Rows filled dynamically by JavaScript -->
      </tbody>
    </table>

    <script>
      (function () {
        'use strict';

        // Maintenance Team Member table
        const ENTITY_TEAM_MEMBER = 'solar_maintenanceteammember';
        const FIELD_TEAM_LOOKUP = 'solar_maintenance_team';
        const FIELD_EMPLOYEE_LOOKUP = 'solar_member';
        const FIELD_EMPLOYEE_NAME = 'solar_maintenanceteammembername';

        // Solar Preventive Task table
        const ENTITY_WORK_ORDER = 'solar_solarpreventivetask';
        const FIELD_WO_EMPLOYEE_LOOKUP = 'solar_prev_employee';
        const FIELD_WO_SCHEDULE_DATE = 'solar_prev_scheduleddate';

        // Solar Corrective Work Order table (for corrective count)
        const ENTITY_CORRECTIVE_WO = 'solar_corrective_work_order';
        const FIELD_CORR_EMPLOYEE = '_solar_employee_value';
        const FIELD_CORR_TEAM = '_solar_maintenanceteamid_value';
        const FIELD_CORR_SCHEDULE_DATE = 'solar_cor_scheduleddate';

        function assignEmployee(employeeId, employeeName) {
          if (!employeeId) return;
          var id = (employeeId + '').replace(/[{}]/g, '');
          var name = employeeName || '';

          function showError(msg) {
            if (parent && parent.Xrm && parent.Xrm.Navigation) {
              parent.Xrm.Navigation.openAlertDialog({ title: 'Assign Employee', text: msg });
            }
          }

          try {
            var formCtx = (window.top || window).__solarPrevTaskFormContext;
            if (!formCtx || typeof formCtx.getAttribute !== 'function') {
              showError('Could not access the form. Close and reopen the pane.');
              return;
            }

            var attr = formCtx.getAttribute(FIELD_WO_EMPLOYEE_LOOKUP);
            if (!attr) {
              showError('Employee field not found on the form.');
              return;
            }

            attr.setValue([{ id: id, name: name, entityType: 'systemuser' }]);

            formCtx.data.save()
              .then(function () {
                if (formCtx.data && formCtx.data.refresh) {
                  formCtx.data.refresh();
                }
              })
              .catch(function (err) {
                showError('Save failed: ' + (err.message || String(err)));
              });

          } catch (err) {
            console.error('[PreventiveTaskTeamMembersPane] Assign failed:', err);
            if (parent && parent.Xrm && parent.Xrm.Navigation) {
              parent.Xrm.Navigation.openAlertDialog({
                title: 'Error',
                text: 'Failed to assign employee: ' + (err.message || String(err)),
              });
            }
          }
        }

        function getScheduleDateFromForm() {
          try {
            var formCtx = (window.top || window).__solarPrevTaskFormContext;
            if (!formCtx || typeof formCtx.getAttribute !== 'function') return null;
            var attr = formCtx.getAttribute(FIELD_WO_SCHEDULE_DATE);
            if (!attr) return null;
            var val = attr.getValue ? attr.getValue() : null;
            if (!val) return null;
            if (typeof val.getFullYear === 'function') {
              var y = val.getFullYear();
              var m = val.getMonth() + 1;
              var d = val.getDate();
              return y + '-' + (m < 10 ? '0' + m : m) + '-' + (d < 10 ? '0' + d : d);
            }
            if (typeof val === 'string' && val.length >= 10) {
              var s = val.substring(0, 10);
              return /^\d{4}-\d{2}-\d{2}$/.test(s) ? s : null;
            }
            return null;
          } catch (e) { return null; }
        }

        function getQueryData() {
          try {
            var data = null;

            try {
              var globalData = (window.top || window).__solarPrevTaskTeamMembersPaneData;
              if (globalData && globalData.teamId) data = globalData;
            } catch (e) {}

            if (!data) {
              try {
                var stored = sessionStorage.getItem('solar_prev_task_team_members_pane_data');
                if (stored) data = JSON.parse(stored);
              } catch (e) {}
            }

            if (!data) {
              try {
                var search = window.location && window.location.search;
                if (search) {
                  var params = new URLSearchParams(search);
                  var dataParam = params.get('data') || params.get('Data');
                  if (dataParam) data = JSON.parse(decodeURIComponent(dataParam));
                }
              } catch (e) {}
            }

            if (!data) {
              try {
                if (parent && parent.Xrm && parent.Xrm.Utility) {
                  var qs = parent.Xrm.Utility.getGlobalContext().getQueryStringParameters();
                  if (qs && qs.data) data = JSON.parse(decodeURIComponent(qs.data));
                }
              } catch (e) {}
            }

            if (data && !data.scheduleDate) {
              var fromForm = getScheduleDateFromForm();
              if (fromForm) data.scheduleDate = fromForm;
            }

            return data;
          } catch (e) {
            console.error('[PreventiveTaskTeamMembersPane] Failed to read data parameter:', e);
            return null;
          }
        }

        function setStatus(message, cssClass) {
          var statusEl = document.getElementById('status');
          statusEl.textContent = message || '';
          statusEl.className = 'status' + (cssClass ? ' ' + cssClass : '');
        }

        function renderRows(members) {
          var container = document.getElementById('rowsContainer');
          container.innerHTML = '';

          if (!members.length) {
            var tr = document.createElement('tr');
            var td = document.createElement('td');
            td.colSpan = 4;
            td.textContent = 'No employees found for this maintenance team.';
            tr.appendChild(td);
            container.appendChild(tr);
            return;
          }

          members.forEach(function (m) {
            var tr = document.createElement('tr');

            var tdName = document.createElement('td');
            tdName.textContent = m.name || '(no name)';
            tr.appendChild(tdName);

            var tdJobs = document.createElement('td');
            tdJobs.style.textAlign = 'center';
            var span = document.createElement('span');
            span.className =
              'jobs-badge ' +
              (m.jobs && m.jobs > 0 ? 'nonzero' : 'zero');
            span.textContent = typeof m.jobs === 'number' ? m.jobs : '-';
            tdJobs.appendChild(span);
            tr.appendChild(tdJobs);

            var tdCorr = document.createElement('td');
            tdCorr.style.textAlign = 'center';
            var spanCorr = document.createElement('span');
            spanCorr.className =
              'jobs-badge ' +
              (m.correctiveJobs && m.correctiveJobs > 0 ? 'nonzero' : 'zero');
            spanCorr.textContent = typeof m.correctiveJobs === 'number' ? m.correctiveJobs : '-';
            tdCorr.appendChild(spanCorr);
            tr.appendChild(tdCorr);

            var tdAssign = document.createElement('td');
            tdAssign.style.textAlign = 'center';
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn-assign';
            btn.textContent = 'Assign';
            btn.title = 'Set this employee as the Employee on the Preventive Task';
            btn.onclick = function () {
              assignEmployee(m.id, m.name);
            };
            tdAssign.appendChild(btn);
            tr.appendChild(tdAssign);

            container.appendChild(tr);
          });
        }

        function getWebApi() {
          if (!parent || !parent.Xrm || !parent.Xrm.WebApi) {
            throw new Error('Xrm.WebApi is not available from parent.');
          }
          return parent.Xrm.WebApi;
        }

        function getTeamMembers(teamId) {
          var selectFields = '_' + FIELD_EMPLOYEE_LOOKUP + '_value,' + FIELD_EMPLOYEE_NAME;
          var query =
            '?$select=' + selectFields +
            '&$filter=_' + FIELD_TEAM_LOOKUP + '_value eq ' + teamId;

          return getWebApi()
            .retrieveMultipleRecords(ENTITY_TEAM_MEMBER, query)
            .then(function (result) {
              var list = result.entities.map(function (e) {
                return {
                  id: e['_' + FIELD_EMPLOYEE_LOOKUP + '_value'],
                  name: e[FIELD_EMPLOYEE_NAME],
                  jobs: 0,
                  correctiveJobs: 0,
                };
              });

              list.sort(function (a, b) {
                return (a.name || '').localeCompare(b.name || '', 'en');
              });

              return list;
            });
        }

        function fillJobsPerMember(members, scheduleDate, teamId) {
          if (!members.length) return Promise.resolve();

          if (!scheduleDate) {
            members.forEach(function (m) { m.jobs = 0; });
            return Promise.resolve();
          }

          var woEmployeeField = '_solar_prev_employee_value';
          var woTeamField = '_solar_maintenanceteam_value';

          var promises = members.map(function (m) {
            if (!m.id) {
              m.jobs = 0;
              return Promise.resolve();
            }

            var empGuid = (m.id || '').replace(/[{}]/g, '');
            var teamGuid = teamId ? (teamId + '').replace(/[{}]/g, '') : null;

            var filter = woEmployeeField + " eq '" + empGuid + "' and statecode eq 0";
            if (teamGuid) {
              filter += " and " + woTeamField + " eq '" + teamGuid + "'";
            }
            filter += " and Microsoft.Dynamics.CRM.On(PropertyName='" + FIELD_WO_SCHEDULE_DATE + "',PropertyValue='" + scheduleDate + "')";

            var query = "?$select=solar_solarpreventivetaskid&$filter=" + encodeURIComponent(filter);

            return getWebApi()
              .retrieveMultipleRecords(ENTITY_WORK_ORDER, query)
              .then(function (res) {
                m.jobs = res.entities.length;
              })
              .catch(function (err) {
                console.warn('[PreventiveTaskTeamMembersPane] Tasks count for', m.name, err.message || err);
                m.jobs = 0;
              });
          });

          return Promise.all(promises);
        }

        function fillCorrectiveJobsPerMember(members, scheduleDate, teamId) {
          if (!members.length) return Promise.resolve();

          if (!scheduleDate) {
            members.forEach(function (m) { m.correctiveJobs = 0; });
            return Promise.resolve();
          }

          var promises = members.map(function (m) {
            if (!m.id) {
              m.correctiveJobs = 0;
              return Promise.resolve();
            }

            var empGuid = (m.id || '').replace(/[{}]/g, '');
            var teamGuid = teamId ? (teamId + '').replace(/[{}]/g, '') : null;

            var filter = FIELD_CORR_EMPLOYEE + " eq '" + empGuid + "' and statecode eq 0";
            if (teamGuid) {
              filter += " and " + FIELD_CORR_TEAM + " eq '" + teamGuid + "'";
            }
            filter += " and Microsoft.Dynamics.CRM.On(PropertyName='" + FIELD_CORR_SCHEDULE_DATE + "',PropertyValue='" + scheduleDate + "')";

            var query = "?$select=solar_corrective_work_orderid&$filter=" + encodeURIComponent(filter);

            return getWebApi()
              .retrieveMultipleRecords(ENTITY_CORRECTIVE_WO, query)
              .then(function (res) {
                m.correctiveJobs = res.entities.length;
              })
              .catch(function (err) {
                console.warn('[PreventiveTaskTeamMembersPane] Corrective count for', m.name, err.message || err);
                m.correctiveJobs = 0;
              });
          });

          return Promise.all(promises);
        }

        function init() {
          var data = getQueryData();
          if (!data || !data.teamId) {
            setStatus(
              'No team data (teamId) found. Close the pane and try again.',
              'error'
            );
            return;
          }

          var subtitleParts = [];
          if (data.teamName) subtitleParts.push('Team: ' + data.teamName);
          if (data.scheduleDate) {
            subtitleParts.push('Date: ' + data.scheduleDate);
          } else {
            subtitleParts.push('Scheduled date not selected');
          }
          document.getElementById('subtitle').textContent =
            subtitleParts.join('  •  ');

          setStatus('Loading employees...', 'loading');

          getTeamMembers(data.teamId)
            .then(function (members) {
              return fillJobsPerMember(members, data.scheduleDate, data.teamId)
                .then(function () {
                  return fillCorrectiveJobsPerMember(members, data.scheduleDate, data.teamId);
                })
                .then(function () {
                  return members;
                });
            })
            .then(function (members) {
              setStatus(
                data.scheduleDate ? '' : 'You have not selected a Scheduled date. Task counts require a date on the Preventive Task form.',
                data.scheduleDate ? '' : 'error'
              );
              renderRows(members);
            })
            .catch(function (error) {
              console.error('[PreventiveTaskTeamMembersPane] Error:', error);
              setStatus(
                'An error occurred while loading the data.',
                'error'
              );
            });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
        } else {
          init();
        }
      })();
    </script>
  </body>
</html>
