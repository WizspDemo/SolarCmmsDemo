<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarOps Manager - Standalone</title>
    
    <!-- SELF-HOSTED: All scripts from same origin (no CDN) - works when external CDNs are blocked -->
    <!-- 1. Tailwind - CDN fallback (if blocked, styles may be minimal but app works) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Fonts - system fallback if blocked -->
    <link href="https://fonts.cdnfonts.com/css/segoe-ui-4" rel="stylesheet">
    
    <!-- 2b. Weather API service (Open-Meteo) - reusable across dashboards -->
    <script src="/WebResources/solar_weatherService"></script>
    
    <!-- 3-6. Self-hosted web resources (absolute URLs for reliable loading) -->
    <!-- Optional: Tab visibility config - uncomment to load from PlantDashboardConfig.js web resource -->
    <!-- <script src="https://org08dc9606.crm4.dynamics.com/WebResources/solar_PlantDashboardConfig"></script> -->

            padding: 0;

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }

    <!-- Removed importmap & /index.css - not compatible with web resources (relative paths fail) -->
</head>
<body>
    <div id="root" data-testid="plant-dashboard-root" data-cursor-element-id="plant-dashboard"></div>

    <script type="text/babel">
        // --- GLOBALS & SETUP ---
        
        // Safety check for the FluentUI global variable
        // Sometimes it exports as FluentUIReact, sometimes just FluentUI depending on the build
        const FluentUI = window.FluentUIReact || window.FluentUI;
        
        if (!FluentUI) {
            document.getElementById('root').innerHTML = `
                <div style="padding: 24px; max-width: 600px; font-family: 'Segoe UI', sans-serif;">
                    <h1 style="color: #c42b1c; margin-bottom: 12px;">Dependency Error</h1>
                    <p style="color: #323130; line-height: 1.5;">Failed to load Fluent UI library. Scripts from CDN (jsDelivr) may be blocked.</p>
                    <h3 style="margin-top: 16px; color: #323130;">Possible solutions:</h3>
                    <ul style="color: #605e5c; line-height: 1.6; margin-left: 20px;">
                        <li><strong>Content Security Policy:</strong> Ask your admin to add <code>cdn.jsdelivr.net</code> and <code>cdn.tailwindcss.com</code> to script-src in Power Platform Admin Center → Environment → Settings → Privacy + Security → Content Security Policy.</li>
                        <li><strong>Network:</strong> Ensure outbound access to cdn.jsdelivr.net is allowed.</li>
                        <li><strong>Alternative:</strong> Use a self-hosted/bundled version of this dashboard as web resources.</li>
                    </ul>
                </div>
            `;
            throw new Error("Fluent UI Global Variable not found");
        }

        const { 
            ThemeProvider, createTheme, Pivot, PivotItem, Text, CommandBar,
            DetailsList, DetailsListLayoutMode, SelectionMode, MessageBar, 
            MessageBarType, Icon, DefaultButton, mergeStyles, Persona, 
            PersonaSize, PersonaPresence, Panel, PanelType, IconButton, 
            ProgressIndicator, initializeIcons, SearchBox 
        } = FluentUI;

        const { useState, useMemo, useEffect } = React;

        // Initialize Icons
        try {
            initializeIcons();
        } catch (e) {
            console.warn("Icon initialization failed or already initialized", e);
        }

        // --- CONSTANTS & DATA ---
        
        const PLOT_IDS = Array.from({ length: 20 }, (_, i) => {
            const num = i + 1;
            return `BN-${num < 10 ? '0' + num : num}`;
        });

        const MOCK_WEATHER = {
            ghi: 945,
            moduleTemp: 72.4,

        };

        const MOCK_HOURLY_WEATHER = [

            { time: '13:00', icon: 'PartlyCloudyDay', temp: 45, ghi: 880, precip: 0 },
            { time: '14:00', icon: 'PartlyCloudyDay', temp: 44, ghi: 750, precip: 5 },
            { time: '15:00', icon: 'Cloudy', temp: 42, ghi: 400, precip: 15 },
        ];

        // --- WEATHER API: uses weatherService.js (WeatherApiService.fetchWeather) ---
        // Coordinates (like PlantDashboardWeather.html): form attributes first, then locationDetails (API), URL ?lat=&lon=, default Benban
        const WEATHER_DEFAULT_LAT = 24.456;
        const WEATHER_DEFAULT_LON = 32.739;

            { id: 'INV-02', name: 'Inv Block 02-A', plotId: 'BN-02', capacityKw: 100, currentOutputKw: 83.2, status: 'Online', lastHeartbeat: '12s ago', efficiency: 0.88 },

            { id: 'INV-14B', name: 'Inv Block 14-B', plotId: 'BN-14', capacityKw: 125, currentOutputKw: 45.0, status: 'Fault', lastHeartbeat: '1 min ago', efficiency: 0.36 },

        const MOCK_TASKS = [

            { id: 'WO-302', title: 'Module Cleaning: Manual', priority: 'Medium', type: 'Preventive', plotId: 'BN-02', assignedTechnician: 'Crew Alpha', status: 'Assigned', dueDate: '2024-03-25' },

            { id: 'WO-305', title: 'Substation A Filter Check', priority: 'Low', type: 'Preventive', plotId: 'BN-05', assignedTechnician: 'Mike R.', status: 'Closed', dueDate: '2024-03-20' },

        const MOCK_TEAM = [
            { id: 'TM-01', name: 'Dr. Layla Hassan', role: 'Plant Manager', phone: '+20 100 555 001', email: 'lhassan@benban-ops.com', status: 'On Site', department: 'Management' },
            { id: 'TM-02', name: 'Eng. Omar Khaled', role: 'Operations Director', phone: '+20 100 555 002', email: 'okhaled@benban-ops.com', status: 'Remote', department: 'Management' },
            { id: 'TM-03', name: 'Sarah Miller', role: 'Senior Electrical Engineer', phone: '+20 100 555 010', email: 'smiller@benban-ops.com', status: 'On Site', department: 'Engineering' },
            { id: 'TM-04', name: 'Ahmed S.', role: 'HV Technician Lead', phone: '+20 100 555 012', email: 'ahmed.s@benban-ops.com', status: 'Deployed', department: 'Operations' },
            { id: 'TM-05', name: 'Cleaning Crew A', role: 'Field Services', phone: '+20 100 555 050', email: 'dispatch.alpha@benban-ops.com', status: 'Deployed', department: 'Operations' },
        ];

        // --- DATAVERSE WEB API INTEGRATION ---
        // When running inside a model-driven app iframe, Xrm.WebApi is available from window.parent
        // Παράμετροι από URL (όταν "Pass row object-type code and unique identifier as parameters" ενεργό)
        function getQueryParams() {
            const search = (window.location && window.location.search) || '';
            const params = {};
            search.replace(/^\?/, '').split('&').forEach(function (part) {
                const p = part.split('=');
                if (p[0]) params[decodeURIComponent(p[0])] = decodeURIComponent((p[1] || '').replace(/\+/g, ' '));
            });
            return params;
        }

        // --- TAB VISIBILITY CONFIG ---
        // Εμφάνιση/κρύψιμο των Pivot tabs (Work Orders, Live Feed, Map, Team, Site Details, Live Cloud Map).
        // 1) Ρύθμιση εδώ: αλλάξτε σε false για να κρύψετε ένα tab.
        // 2) URL params: ?tabs=workorders,livefeed,map παίρνει μόνο αυτά | ?hide=windy,team κρύβει αυτά.
        const TAB_DEFINITIONS = [
            { itemKey: 'workorders', headerText: 'Work Orders', itemIcon: 'TaskList' },
            { itemKey: 'livefeed', headerText: 'Live Feed', itemIcon: 'AnalyticsView' },
            { itemKey: 'map', headerText: 'Map', itemIcon: 'Map' },
            { itemKey: 'team', headerText: 'Team', itemIcon: 'People' },
            { itemKey: 'sitedetails', headerText: 'Site Details', itemIcon: 'Info' },
            { itemKey: 'windy', headerText: 'Live Cloud Map', itemIcon: 'Globe' }
        ];
        // Αλλάξτε σε false για να κρύψετε ένα tab (π.χ. windy: false).
        const DEFAULT_TAB_VISIBILITY = { workorders: true, livefeed: true, map: true, team: true, sitedetails: true, windy: true };
        function getTabVisibility() {
            const q = getQueryParams();
            let vis = { ...DEFAULT_TAB_VISIBILITY };
            if (window.PlantDashboardConfig && typeof window.PlantDashboardConfig.visibleTabs === 'object') {
                Object.keys(vis).forEach(k => { vis[k] = !!window.PlantDashboardConfig.visibleTabs[k]; });
            }
            if (q.tabs) {
                const show = q.tabs.split(',').map(s => s.trim().toLowerCase());
                Object.keys(vis).forEach(k => { vis[k] = show.includes(k); });
            }
            if (q.hide) {
                const hide = q.hide.split(',').map(s => s.trim().toLowerCase());
                hide.forEach(k => { vis[k] = false; });
            }
            return vis;
        }
        function getVisibleTabs() {
            const vis = getTabVisibility();
            return TAB_DEFINITIONS.filter(t => vis[t.itemKey]);
        }

        // --- WIDGET VISIBILITY CONFIG ---
        // MessageBar, stats cards (ανά card), weather-widget, Inverter Status.
        const STATS_CARD_KEYS = ['preventiveHealth', 'preventiveWorkflow', 'criticalDefects', 'correctiveWorkflow'];
        // MessageBar, stats cards (ανά card), weather-widget, Inverter Status. Αλλάξτε σε false για κρύψιμο.
        const DEFAULT_WIDGET_VISIBILITY = {
            showMessageBar: true,
            statsCards: { preventiveHealth: true, preventiveWorkflow: true, criticalDefects: true, correctiveWorkflow: true },
            showWeatherWidget: true,
            showInverterStatus: true
        };
        function getWidgetVisibility() {
            const q = getQueryParams();
            let cfg = {
                showMessageBar: DEFAULT_WIDGET_VISIBILITY.showMessageBar,
                statsCards: { ...DEFAULT_WIDGET_VISIBILITY.statsCards },
                showWeatherWidget: DEFAULT_WIDGET_VISIBILITY.showWeatherWidget,
                showInverterStatus: DEFAULT_WIDGET_VISIBILITY.showInverterStatus
            };
            if (window.PlantDashboardConfig) {
                const c = window.PlantDashboardConfig;
                if (typeof c.showMessageBar === 'boolean') cfg.showMessageBar = c.showMessageBar;
                if (c.statsCards && typeof c.statsCards === 'object') STATS_CARD_KEYS.forEach(k => { if (typeof c.statsCards[k] === 'boolean') cfg.statsCards[k] = c.statsCards[k]; });
                if (typeof c.showWeatherWidget === 'boolean') cfg.showWeatherWidget = c.showWeatherWidget;
                if (typeof c.showInverterStatus === 'boolean') cfg.showInverterStatus = c.showInverterStatus;
            }
            if (q.showMessageBar !== undefined) cfg.showMessageBar = q.showMessageBar !== '0' && q.showMessageBar !== 'false';
            if (q.statsCards) { const show = q.statsCards.split(',').map(s => s.trim().toLowerCase()); STATS_CARD_KEYS.forEach(k => { cfg.statsCards[k] = show.includes(k); }); }
            if (q.hideStatsCards) { const hide = q.hideStatsCards.split(',').map(s => s.trim().toLowerCase()); hide.forEach(k => { cfg.statsCards[k] = false; }); }
            if (q.showWeatherWidget !== undefined) cfg.showWeatherWidget = q.showWeatherWidget !== '0' && q.showWeatherWidget !== 'false';
            if (q.showInverterStatus !== undefined) cfg.showInverterStatus = q.showInverterStatus !== '0' && q.showInverterStatus !== 'false';
            return cfg;
        }

        function getRecordIdFromContext() {
            const q = getQueryParams();
            if (q.id) return q.id.replace(/[{}]/g, '');
            try {
                const xrm = window.parent && window.parent.Xrm;
                if (xrm && xrm.Page && xrm.Page.data && xrm.Page.data.entity) return xrm.Page.data.entity.getId().replace(/[{}]/g, '');
            } catch (e) { /* cross-frame or no form */ }
            return null;
        }
        function getEntityNameFromContext() {
            const q = getQueryParams();
            if (q.typename) return q.typename;
            try {
                const xrm = window.parent && window.parent.Xrm;
                if (xrm && xrm.Page && xrm.Page.data && xrm.Page.data.entity) return xrm.Page.data.entity.getEntityName();
            } catch (e) { /* cross-frame or no form */ }
            return null;
        }
        function getXrmWebApi() {
            try {
                if (window.parent && window.parent.Xrm && window.parent.Xrm.WebApi) return window.parent.Xrm.WebApi;
            } catch (e) { }
            return null;
        }

        // Get latitude/longitude from form controls when dashboard is embedded in solar_location form
        // (same as PlantDashboardWeather.html - uses window.parent.Xrm.Page.getAttribute)
        function getLatLonFromFormAttribute() {
            try {
                const xrm = window.parent && window.parent.Xrm;
                if (!xrm || !xrm.Page) return null;
                const entity = getEntityNameFromContext();
                if (entity !== 'solar_location') return null;
                const attrLat = xrm.Page.getAttribute && xrm.Page.getAttribute('solar_latitude');
                const attrLon = xrm.Page.getAttribute && xrm.Page.getAttribute('solar_longitude');
                if (!attrLat || !attrLon) return null;
                const latVal = attrLat.getValue();
                const lonVal = attrLon.getValue();
                if (latVal == null || latVal === '' || lonVal == null || lonVal === '') return null;
                const lat = parseFloat(latVal);
                const lon = parseFloat(lonVal);
                if (isNaN(lat) || isNaN(lon)) return null;
                return { lat, lon };
            } catch (e) { return null; }
        }

        // Effective lat/lon: form attributes first, then locationDetails, URL params, default (like PlantDashboardWeather.html)
        function getEffectiveLatLon(locationDetails) {
            const q = getQueryParams();
            const latFromUrl = q.lat ? parseFloat(q.lat) : null;
            const lonFromUrl = q.lon ? parseFloat(q.lon) : null;
            const fromForm = getLatLonFromFormAttribute();
            const lat = (fromForm && !isNaN(fromForm.lat)) ? fromForm.lat
                : (locationDetails?.latitude != null && !isNaN(locationDetails.latitude) ? locationDetails.latitude
                : (latFromUrl != null && !isNaN(latFromUrl) ? latFromUrl : WEATHER_DEFAULT_LAT));
            const lon = (fromForm && !isNaN(fromForm.lon)) ? fromForm.lon
                : (locationDetails?.longitude != null && !isNaN(locationDetails.longitude) ? locationDetails.longitude
                : (lonFromUrl != null && !isNaN(lonFromUrl) ? lonFromUrl : WEATHER_DEFAULT_LON));
            return { lat, lon };
        }

        const isDataverseContext = () => !!getXrmWebApi();

        const ENTITY_LOCATION = 'solar_location';
        const ENTITY_CORRECTIVE_WORK_ORDER = 'solar_corrective_work_order';
        const ENTITY_DASHBOARD_CONFIG = 'solar_dashboardconfig';
        const CONFIG_KEY_PLANT_DASHBOARD = 'PlantDashboard';

        function applyConfigToWindow(parsed) {
            if (!parsed || typeof parsed !== 'object') return;
            window.PlantDashboardConfig = window.PlantDashboardConfig || {};
            if (parsed.visibleTabs) window.PlantDashboardConfig.visibleTabs = parsed.visibleTabs;
            else if (parsed.tabs) window.PlantDashboardConfig.visibleTabs = parsed.tabs;
            if (typeof parsed.showMessageBar === 'boolean') window.PlantDashboardConfig.showMessageBar = parsed.showMessageBar;
            if (typeof parsed.showWeatherWidget === 'boolean') window.PlantDashboardConfig.showWeatherWidget = parsed.showWeatherWidget;
            if (typeof parsed.showInverterStatus === 'boolean') window.PlantDashboardConfig.showInverterStatus = parsed.showInverterStatus;
            if (parsed.statsCards && typeof parsed.statsCards === 'object') window.PlantDashboardConfig.statsCards = parsed.statsCards;
        }

        async function fetchConfigViaRest() {
            try {
                const url = window.location.origin + '/api/data/v9.2/solar_dashboardconfigs?$filter=solar_configkey eq \'' + CONFIG_KEY_PLANT_DASHBOARD + '\'&$top=1&$select=solar_configjson';
                const res = await fetch(url, { credentials: 'include', headers: { 'Accept': 'application/json', 'OData-MaxVersion': '4.0' } });
                if (!res.ok) return false;
                const data = await res.json();
                const entities = data.value || data.entities || [];
                if (entities.length > 0 && entities[0].solar_configjson) {
                    applyConfigToWindow(JSON.parse(entities[0].solar_configjson));
                    return true;
                }
            } catch (e) { console.warn('fetchConfigViaRest:', e); }
            return false;
        }

        async function fetchConfigFromDataverse() {
            const webApi = getXrmWebApi();
            if (webApi) {
                try {
                    const result = await webApi.retrieveMultipleRecords(ENTITY_DASHBOARD_CONFIG,
                        "?$filter=solar_configkey eq '" + CONFIG_KEY_PLANT_DASHBOARD + "'&$top=1&$select=solar_configjson");
                    if (result && result.entities && result.entities.length > 0 && result.entities[0].solar_configjson) {
                        applyConfigToWindow(JSON.parse(result.entities[0].solar_configjson));
                        return;
                    }
                } catch (e) { console.warn('fetchConfigFromDataverse:', e); }
            }
            await fetchConfigViaRest();
        }

        // Get current Solar Park (solar_location) ID when dashboard is embedded in Solar Parks form
        const getCurrentSolarParkId = async () => {
            const id = getRecordIdFromContext();
            const entity = getEntityNameFromContext();
            if (entity === ENTITY_LOCATION && id) return id;
            try {
                const xrm = window.parent && window.parent.Xrm;
                if (!xrm) return null;
                if (xrm.Utility && xrm.Utility.getPageContext) {
                    const ctx = typeof xrm.Utility.getPageContext().then === 'function'
                        ? await xrm.Utility.getPageContext()
                        : xrm.Utility.getPageContext();
                    if (ctx && ctx.input && ctx.input.entityId && (ctx.input.entityTypeName || '').toLowerCase() === 'solar_location')
                        return ctx.input.entityId.replace(/[{}]/g, '');
                }
            } catch (e) { console.warn('getCurrentSolarParkId:', e); }
            return id || null;
        };

        // Fetch corrective work order counts for one Solar Park (filtered by location) - FetchXML για σωστό GUID filter
        const fetchCorrectiveCountsByLocation = async (locationId) => {
            const webApi = getXrmWebApi();
            if (!webApi || !locationId) return { openTickets: 0, total: 0 };
            try {
                const guid = locationId.replace(/[{}]/g, '');
                const fetchXml = '<fetch>' +
                    '<entity name="solar_corrective_work_order">' +
                    '<attribute name="solar_corrective_work_orderid"/>' +
                    '<attribute name="statecode"/>' +
                    '<attribute name="statuscode"/>' +
                    '<filter type="and">' +
                    '<condition attribute="solar_locationid" operator="eq" value="{' + guid + '}"/>' +
                    '</filter>' +
                    '</entity>' +
                    '</fetch>';
                const options = '?fetchXml=' + encodeURIComponent(fetchXml);
                const result = await webApi.retrieveMultipleRecords(ENTITY_CORRECTIVE_WORK_ORDER, options);
                const entities = (result && result.entities) ? result.entities : (Array.isArray(result) ? result : []);
                const total = entities.length;
                const openTickets = entities.filter(r => r.statecode !== 1).length;
                return { openTickets, total };
            } catch (e) { console.warn('fetchCorrectiveCountsByLocation failed:', e); return { openTickets: 0, total: 0 }; }
        };

        function mapWorkOrderToTask(wo) {
            const loc = wo.solar_locationid;
            const team = wo.solar_maintenanceteamid;
            const locName = (loc && (typeof loc === 'object') && loc.solar_name) ? loc.solar_name : (wo['solar_locationid@OData.Community.Display.V1.FormattedValue'] || wo['loc.solar_name'] || '-');
            const teamName = (team && (typeof team === 'object') && team.solar_name) ? team.solar_name : (wo['solar_maintenanceteamid@OData.Community.Display.V1.FormattedValue'] || wo['team.solar_name'] || '-');
            const ownerName = wo['owneruser.fullname'] || wo['ownerteam.name'] || wo['ownerid@OData.Community.Display.V1.FormattedValue'] || '-';
            const status = (() => { if (wo.statecode === 1) return 'Closed'; const lbl = (wo['solar_solar_status@OData.Community.Display.V1.FormattedValue'] || wo.solar_solar_statusname || wo['solar_status@OData.Community.Display.V1.FormattedValue'] || wo.solar_statusname || wo['statuscode@OData.Community.Display.V1.FormattedValue'] || wo.statuscodename || '').toString().trim(); if (lbl) { const s = lbl.toLowerCase(); if (s.includes('assigned')) return 'Assigned'; if (s.includes('in progress') || s.includes('inprogress')) return 'In Progress'; if (s.includes('closed')) return 'Closed'; if (s.includes('open')) return 'Open'; } return wo.statuscode === 2 ? 'In Progress' : wo.statuscode === 3 ? 'Assigned' : 'Open'; })();
            return {
                id: wo.solar_corrective_work_orderid || wo.solar_name || ('WO-' + (wo.solar_corrective_work_orderid || '').slice(0, 8)),
                title: wo.solar_name || '-',
                priority: (wo.solar_solar_priority !== undefined && wo.solar_solar_priority !== null) ? (wo.solar_solar_priority === 1 ? 'Critical' : wo.solar_solar_priority === 2 ? 'High' : 'Medium') : 'Medium',
                type: 'Corrective',
                plotId: locName,
                assignedTechnician: teamName,
                assignedTo: ownerName,
                status: status,
                dueDate: wo.solar_solar_enddate ? new Date(wo.solar_solar_enddate).toISOString().slice(0, 10) : '-'
            };
        }

        const fetchDataverseWorkOrders = async (recordId, entityName) => {
            const webApi = getXrmWebApi();
            if (!webApi) return null;
            try {
                const filterAttr = entityName === ENTITY_LOCATION ? 'solar_locationid' : (entityName === ENTITY_CORRECTIVE_WORK_ORDER ? 'solar_corrective_work_orderid' : 'solar_locationid');
                const id = (recordId || '').replace(/[{}]/g, '');
                if (!id) return [];
                const fetchXml = '<fetch>' +
                    '<entity name="solar_corrective_work_order">' +
                    '<attribute name="solar_corrective_work_orderid"/>' +
                    '<attribute name="solar_name"/>' +
                    '<attribute name="solar_description"/>' +

                                        <DefaultButton 
                                            text="View all work orders" 
                                            iconProps={{ iconName: 'FabricFolder' }}
                                            onClick={() => setFilterText('')}
                                        />
                                    </div>
                                )}
                            </div>

                            <div data-testid="main-content-area" className="flex-grow overflow-auto p-4 lg:p-6 scroll-smooth">
                                {selectedTab === 'workorders' && (
                                    <div className="h-full">
                                        <div data-testid="work-orders-list" className="hidden md:block bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                                            <DetailsList
                                                items={filteredTasks}
                                                columns={columns}
                                                setKey="set"
                                                layoutMode={DetailsListLayoutMode.justified}
                                                selectionMode={SelectionMode.none}
                                            />
                                        </div>
                                        <div className="md:hidden">
                                            {filteredTasks.map(task => (
                                                <MobileTaskCard key={task.id} task={task} />
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {selectedTab === 'livefeed' && (
                                    <div className="h-full flex flex-col items-center justify-center text-gray-400 min-h-[300px]">
                                        <Icon iconName="LineChart" className="text-6xl mb-4 text-gray-300" />
                                        <Text variant="large">Real-time SCADA Telemetry Stream</Text>
                                        <Text variant="small">Connecting to WebSocket...</Text>
                                    </div>
                                )}

                                {selectedTab === 'map' && (
                                    <div className="h-full flex flex-col">
                                        <div className="mb-4">
                                            <Text variant="large" className="font-bold text-slate-700">Sector Heatmap</Text>
                                            <Text variant="small" className="text-gray-500 block">Visual distribution of open defects.</Text>
                                        </div>
                                        <div className={gridContainerClass}>
                                            {plotData.map((plot) => {
                                                let bgColor = 'bg-emerald-500 hover:bg-emerald-600 text-white'; 
                                                if (plot.hasWarning) bgColor = 'bg-amber-400 hover:bg-amber-500 text-slate-800'; 
                                                if (plot.hasCritical) bgColor = 'bg-red-600 hover:bg-red-700 text-white'; 
                                                
                                                return (
                                                    <div key={plot.id} data-testid={`plot-cell-${plot.id}`} className={`${plotCellBaseClass} ${bgColor}`}>
                                                        <span className="font-mono font-bold text-lg">{plot.id}</span>
                                                        <div className="flex flex-col items-center">
                                                            {plot.taskCount > 0 ? (
                                                                <span className="text-xs bg-white/30 px-2 rounded-full mt-1 font-semibold">
                                                                    {plot.taskCount} Issues
                                                                </span>
                                                            ) : (
                                                                <Icon iconName="CheckMark" className="mt-1" />
                                                            )}
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                )}

                                {selectedTab === 'team' && (
                                    <div className="h-full flex flex-col">
                                        {[...new Set(team.map(m => m.department || 'Operations'))].map((dept) => (
                                            <div key={dept} className="mb-8">
                                                <Text variant="medium" className="font-bold text-teal-800 uppercase border-b border-gray-200 pb-2 mb-4 block tracking-wider">{dept}</Text>
                                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                                                    {team.filter(m => m.department === dept).map(member => (
                                                        <div key={member.id} className="bg-white rounded-lg shadow-sm border border-gray-200 hover:border-teal-400 hover:shadow-md transition-all group overflow-hidden">
                                                            <div className="p-4">
                                                                <Persona
                                                                    text={member.name}
                                                                    secondaryText={member.role}
                                                                    tertiaryText={member.status}
                                                                    size={PersonaSize.size48}
                                                                    presence={member.status === 'On Site' || member.status === 'Deployed' ? PersonaPresence.online : member.status === 'Remote' ? PersonaPresence.away : PersonaPresence.offline}
                                                                    styles={{ primaryText: { fontWeight: 'bold', color: '#333' } }}
                                                                />
                                                            </div>
                                                            <div className="bg-gray-50 px-4 py-2 border-t border-gray-100 flex flex-col gap-1.5">
                                                                <div className="flex items-center gap-3 text-xs text-gray-600 hover:text-teal-700 transition-colors cursor-pointer group/item">
                                                                    <Icon iconName="Phone" className="text-gray-400 group-hover/item:text-teal-600" /> 
                                                                    <span className="font-mono">{member.phone}</span>
                                                                </div>
                                                                <div className="flex items-center gap-3 text-xs text-gray-600 hover:text-teal-700 transition-colors cursor-pointer group/item">
                                                                    <Icon iconName="Mail" className="text-gray-400 group-hover/item:text-teal-600" /> 
                                                                    <span className="truncate">{member.email}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {selectedTab === 'sitedetails' && (
                                    <SiteDetailsContent locationDetails={locationDetails} />
                                )}

                                {selectedTab === 'windy' && (
                                    <div className="h-full p-1">
                                        <WindyMapWidget locationDetails={locationDetails} />
                                    </div>
                                )}
                            </div>
                        </div>

                        <div data-testid="telemetry-sidebar" className="hidden lg:block w-80 bg-white border-l border-gray-200 overflow-y-auto flex-shrink-0 shadow-[0_0_20px_rgba(0,0,0,0.05)] z-10">
                            <div className="p-4">
                                <TelemetryContent 
                                    weather={weather || MOCK_WEATHER} 
                                    hourlyWeather={hourlyWeather}
                                    generation={totalGeneration} 
                                    pr={performanceRatio} 
                                    inverters={inverters}
                                    showWeatherWidget={widgetVisibility.showWeatherWidget}
                                    showInverterStatus={widgetVisibility.showInverterStatus}
                                />
                            </div>
                        </div>

                        <Panel
                            isOpen={isSidebarOpen}
                            onDismiss={() => setIsSidebarOpen(false)}
                            type={PanelType.smallFixedFar}
                            headerText="Real-time Telemetry"
                            closeButtonAriaLabel="Close"
                        >
                            <div className="py-4">
                                <TelemetryContent 
                                    weather={weather || MOCK_WEATHER} 
                                    hourlyWeather={hourlyWeather}
                                    generation={totalGeneration} 
                                    pr={performanceRatio} 
                                    inverters={inverters}
                                    showWeatherWidget={widgetVisibility.showWeatherWidget}
                                    showInverterStatus={widgetVisibility.showInverterStatus}
                                />
                            </div>
                        </Panel>
                    </div>
                </ThemeProvider>
            );
        };

        (async function bootstrap() {
            await fetchConfigFromDataverse();
            ReactDOM.render(<App />, document.getElementById('root'));
        })();
    </script>
    <!-- Removed /index.tsx - not compatible with web resources -->
</body>
</html>
